[workspace]
channels = ["conda-forge"]
name = "LIBERO"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.10.*"
tqdm = ">=4.67.3,<5"
yaml = ">=0.2.5,<0.3"
pyyaml = ">=6.0.3,<7"
termcolor = ">=3.3.0,<4"
nvitop = ">=1.6.2,<2"
mujoco = { version = ">=3.6.0,<4", channel = "conda-forge" }
mesalib = { version = ">=26.0.3,<27", channel = "conda-forge" }
glew = { version = ">=2.3.0,<3", channel = "conda-forge" }
glfw = { version = ">=3.4,<4", channel = "conda-forge" }
pytorch = ">=2.10.0,<3"
torchvision = ">=0.26.0,<0.27"
torchaudio = ">=2.10.0,<3"
lazygit = ">=0.61.1,<0.62"
transformers = ">=4.40.1"
ipykernel = ">=7.2.0,<8"
pip = ">=26.0.1,<27"
easydict = ">=1.13,<2"
matplotlib = ">=3.10.9,<4"
cloudpickle = ">=3.1.2,<4"
gym = ">=0.26.1,<0.27"

[pypi-dependencies]
robosuite = "==1.4.0"
transformers = ">=4.40.1"
accelerate = ">=1.13.0, <2"
timm = ">=1.0.26, <2"
einops = ">=0.8.2, <0.9"
imageio = { version = ">=2.37.3, <3", extras = ["ffmpeg"] }
huggingface-hub = { version = "*", extras = ["cli"] }
datasets = ">=1.1.1, <2"
tokenizers = "*"
bddl = ">=3.6.0, <4"
