glfw = { version = ">=3.4,<4", channel = "conda-forge" }
pytorch = ">=2.10.0,<3"
torchvision = ">=0.26.0,<0.27"
torchaudio = ">=2.10.0,<3"
lazygit = ">=0.61.1,<0.62"

[pypi-dependencies]
robosuite = ">=1.5.1, <2"
